name: Deploy VNgine to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: VNgine/package-lock.json

      - name: Install dependencies
        working-directory: VNgine
        run: npm ci

      - name: Build apps
        working-directory: VNgine
        env:
          VITE_EDITOR_BASE_PATH: /VNgine/editor/
          VITE_ENGINE_BASE_PATH: /VNgine/engine/
        run: npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site/editor site/engine
          cp -R VNgine/Editor/dist/. site/editor/
          cp -R VNgine/Engine/dist/. site/engine/
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>VNgine</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-content: center;
                  gap: 16px;
                  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
                  background: #111418;
                  color: #edf1f4;
                }
                h1 { margin: 0; }
                nav { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
                a {
                  color: #edf1f4;
                  text-decoration: none;
                  border: 1px solid #343c45;
                  background: #20262d;
                  border-radius: 6px;
                  padding: 10px 14px;
                }
              </style>
            </head>
            <body>
              <h1>VNgine</h1>
              <nav>
                <a href="./editor/">Open Editor</a>
                <a href="./engine/">Open Engine</a>
              </nav>
            </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
